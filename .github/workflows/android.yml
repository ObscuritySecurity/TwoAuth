name: Android Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v3
      with:
        node-version: '18'
    - run: npm install
    - run: npm install @capacitor/core@^5.0.0 @capacitor/cli@^5.0.0 @capacitor/android@^5.0.0
    - name: Configure Next.js for export
      run: |
        echo "module.exports = { output: 'export', trailingSlash: true, distDir: 'out', typescript: { ignoreBuildErrors: true } }" > next.config.js
    - run: npm run build
    - name: Create capacitor.config.json
      run: |
        echo '{
          "appId": "com.obscuritysecurity.twoauth",
          "appName": "TwoAuth",
          "webDir": "out",
          "server": {
            "androidScheme": "https"
          }
        }' > capacitor.config.json
    - run: npx cap add android
    - run: npx cap sync android
    - name: Setup Android SDK
      run: |
        echo "android.compileSdkVersion=33" >> android/gradle.properties
        echo "android.targetSdkVersion=33" >> android/gradle.properties
        echo "android.minSdkVersion=23" >> android/gradle.properties
    - uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
    - run: cd android && ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: android-app
        path: android/app/build/outputs/apk/debug/app-debug.apk
