name: Android Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v3
      with:
        node-version: '20'
    - run: npm install
    - run: npm install @capacitor/core@^7.0.0 @capacitor/cli@^7.0.0 @capacitor/android@^7.0.0 @capacitor/camera @aparajita/capacitor-biometric-auth
    - name: Copy custom icon
      run: |
        if [ -f "assets/logo.png" ]; then
          mkdir -p public/assets/icon/
          cp assets/logo.png public/assets/icon/icon.png
          echo "Custom icon copied successfully"
        else
          echo "Custom icon not found, using default"
          sudo apt-get install -y imagemagick
          convert -size 512x512 xc:'#2563EB' -gravity center -pointsize 100 -fill white -annotate +0+0 "2FA" public/assets/icon/icon.png
        fi
    - name: Configure Next.js for export
      run: |
        echo "module.exports = { output: 'export', trailingSlash: true, distDir: 'out', typescript: { ignoreBuildErrors: true } }" > next.config.js
    - run: npm run build
    - name: Create capacitor.config.json
      run: |
        echo '{
          "appId": "com.obscuritysecurity.twoauth",
          "appName": "TwoAuth",
          "webDir": "out",
          "icon": "assets/icon/icon.png",
          "plugins": {
            "Camera": {
              "cameraPermission": "Necesită acces la cameră pentru scanarea codurilor QR"
            },
            "BiometricAuth": {
              "biometricAuth": true
            }
          },
          "server": {
            "url": "http://localhost",
            "androidScheme": "https"
          }
        }' > capacitor.config.json
    - run: npx cap add android
    - run: npx cap sync android
    - name: Add Android permissions
      run: |
        echo '<?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:amazon="http://schemas.amazon.com/apk/res/android">

          <uses-permission android:name="android.permission.CAMERA" />
          <uses-permission android:name="android.permission.USE_BIOMETRIC" />
          <uses-permission android:name="android.permission.USE_FINGERPRINT" />
          <uses-permission android:name="android.permission.USE_FACE" />

          <application>
          </application>

        </manifest>' > android/capacitor-cordova-android-plugins/src/main/AndroidManifest.xml
    - name: Setup Android SDK
      run: |
        echo "android.compileSdkVersion=33" >> android/gradle.properties
        echo "android.targetSdkVersion=33" >> android/gradle.properties
        echo "android.minSdkVersion=23" >> android/gradle.properties
    - uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'
    - run: cd android && ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: android-app
        path: android/app/build/outputs/apk/debug/*.apk
